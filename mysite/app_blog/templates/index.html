<!DOCTYPE html>
<html>
<head>
    <title>Blog</title>
</head>
<body>

<h1>Персональний блог</h1>

<h2>Категорії</h2>
<ul>
{% for category in categories %}
    <li>
        <a href="{{ category.get_absolute_url }}">
            {{ category.category }}
        </a>
    </li>
{% endfor %}
</ul>

<h2>Останні статті</h2>
<ul>
{% for article in articles %}
    <li>
        <a href="{{ article.get_absolute_url }}">
            {{ article.title }}
        </a>
    </li>
{% endfor %}
</ul>

<a href="/articles/">Усі статті</a>

</body>
</html>
